<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>MEI DAS System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h2>Emitir DAS MEI</h2>

  <input id="cnpj" placeholder="Digite o CNPJ">

  <select id="ano">
    <option value="2026">2026</option>
  </select>

  <select id="mes">
    <option value="01">Janeiro</option>
    <option value="02">Fevereiro</option>
    <option value="03">Março</option>
  </select>

  <button onclick="gerar()">Salvar</button>
  <button onclick="copiar()">Copiar CNPJ</button>
  <button onclick="abrir()">Abrir PGMEI</button>

  <h3>Histórico</h3>
  <ul id="lista"></ul>
</div>

<script src="app.js"></script>
</body>
</html>
